<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Admin Upload Kegiatan</title>

    <link rel="icon" type="image/png" href="images/logosensus2026.png" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link href="css/bootstrap-icons.css" rel="stylesheet" />
    <link href="css/templatemo-tiya-golf-club.css" rel="stylesheet" />
    <link href="css/landingbaru.css" rel="stylesheet" />
    <link href="css/admin.css" rel="stylesheet" />
  </head>

  <body>
    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img
            src="images/logoBPS.png"
            class="navbar-brand-image img-fluid"
            alt="BPS"
          />

          <span class="navbar-brand-text">
            BADAN PUSAT STATISTIK
            <small>Kabupaten Sijunjung</small>
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-lg-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- FORM -->

    <div class="container py-5">
      <div class="card shadow-sm p-4">
        <h4 class="mb-4 text-center">Upload Kegiatan</h4>

        <!-- STATUS MESSAGE -->
        <div id="statusMessage"></div>

        <form id="kegiatanForm">
          <!-- hidden crop data -->

          <input type="hidden" id="offsetX" name="offsetX" />
          <input type="hidden" id="offsetY" name="offsetY" />

          <div class="row g-4">
            <!-- ======================
INPUT FORM
====================== -->

            <div class="col-lg-6">
              <div class="mb-3">
                <label class="form-label">Nama Kegiatan</label>

                <input
                  type="text"
                  id="nama"
                  class="form-control"
                  placeholder="Masukkan nama kegiatan"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Tanggal Kegiatan</label>

                <input type="date" id="tanggal" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Deskripsi</label>

                <textarea
                  id="deskripsi"
                  class="form-control"
                  rows="4"
                  placeholder="Deskripsi kegiatan"
                ></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label">Upload Gambar Cover</label>

                <input
                  type="file"
                  id="gambar"
                  class="form-control"
                  accept="image/png,image/jpeg,image/jpg"
                  required
                />

                <small class="text-muted">
                  Gunakan gambar landscape agar hasil lebih optimal.
                </small>
              </div>

              <button class="btn btn-primary w-100">Upload Kegiatan</button>
            </div>

            <!-- ======================
PREVIEW AREA
====================== -->

            <div class="col-lg-6">
              <label class="form-label"> Preview Cover Event </label>

              <div class="preview-container">
                <div class="preview-placeholder">
                  Pilih gambar untuk preview
                </div>

                <img id="previewImage" />
              </div>

              <small class="text-muted">
                Geser gambar untuk menentukan bagian yang tampil pada card
                event.
              </small>
            </div>
          </div>
        </form>
      </div>
    </div>
    <div id="loginOverlay">
      <div class="login-box">
        <h4>Admin Login</h4>

        <input
          type="text"
          id="adminUser"
          placeholder="Username"
          class="form-control mb-2"
        />

        <input
          type="password"
          id="adminPass"
          placeholder="Password"
          class="form-control mb-3"
        />

        <button id="loginBtn" class="btn btn-primary w-100">Login</button>

        <div id="loginError" class="text-danger mt-2"></div>
      </div>
    </div>

    <!-- SCRIPT -->

    <script type="module" src="js/formInput.js"></script>
    <script type="module" src="js/supabase/proteksiAdmin.js"></script>
    <script type="module" src="js/supabase/kegiatanAdmin.js"></script>
  </body>
</html>
